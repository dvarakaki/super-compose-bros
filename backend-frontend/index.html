<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docker Compose · Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="ocean">
  <div class="bubbles" id="bubbles"></div>
</div>

<div class="page">
  <div class="card fade-in" id="card">

    <!-- HEADER -->
    <div class="card-header">
      <div class="header-title">
        <i class="fa-brands fa-docker"></i>
        <span>Docker Compose &middot; Quiz</span>
      </div>
      <div class="header-meta">
        <span class="badge" id="prog-badge">Pergunta 1/3</span>
        <span class="badge score-badge" id="score-badge">
          <i class="fa-solid fa-star" style="font-size:0.7rem;margin-right:3px"></i>
          <span id="score-val">0</span>/3
        </span>
        <button class="btn-restart-header" id="btn-restart-header" onclick="restartQuiz()">
          <i class="fa-solid fa-rotate-left"></i> Reiniciar
        </button>
      </div>
    </div>

    <!-- PROGRESS BAR -->
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>

    <!-- QUESTION AREA -->
    <div class="card-body" id="question-area">
      <!-- injected by JS -->
    </div>

    <!-- FOOTER -->
    <div class="card-footer" id="card-footer">
      <div class="footer-dots" id="footer-dots"></div>
      <span id="footer-hint">Selecione uma opção para continuar</span>
    </div>

  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast" role="alert" aria-live="assertive">
  <i class="fa-solid toast-icon" id="toast-icon"></i>
  <span class="toast-msg" id="toast-msg"></span>
</div>

<script src="js/script.js"></script>
</body>
</html>
