<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/gif" href="frontend/assets/images/boss-final.gif">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Compose Bros · Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="frontend/assets/css/style.css" />
  <style>
    .login-card {
      position: relative;
      width: 100%;
      max-width: 420px;
      background: rgba(10, 6, 18, 0.82);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-radius: 20px;
      border: 1px solid #2a1550;
      box-shadow:
        0 32px 80px rgba(0,0,0,0.75),
        0 8px 24px rgba(107,33,168,0.2),
        inset 0 1px 0 rgba(147,51,234,0.12);
      animation: cardIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      overflow: hidden;
    }

    /* brilho roxo no topo */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg,
        transparent,
        rgba(147,51,234,0.6) 50%,
        transparent
      );
      pointer-events: none;
    }

    .login-header {
      padding: 2.25rem 2rem 1.75rem;
      text-align: center;
      border-bottom: 1px solid #2a1550;
      background: linear-gradient(180deg, rgba(45,16,96,0.5) 0%, transparent 100%);
    }

    .login-header .icon-wrap {
      width: 90px;
      height: 90px;
      margin: 0 auto 1.1rem;
      border-radius: 50%;
      background: rgba(107,33,168,0.15);
      border: 1px solid rgba(147,51,234,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 0 32px rgba(147,51,234,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .login-header .icon-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
    }

    .login-header .pixel-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      color: #c084fc;
      letter-spacing: 0.07em;
      line-height: 2;
      text-shadow: 0 0 24px rgba(192,132,252,0.6), 0 0 60px rgba(147,51,234,0.3);
    }

    .login-header .subtitle {
      margin-top: 0.55rem;
      font-size: 0.8rem;
      color: #5c4d7a;
      font-weight: 400;
    }

    .login-body {
      padding: 2rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      margin-bottom: 1.4rem;
    }

    .input-group label {
      font-size: 0.7rem;
      font-weight: 700;
      color: #5c4d7a;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      color: #3d2868;
      font-size: 0.85rem;
      pointer-events: none;
      transition: color 0.2s;
    }

    .input-group input {
      width: 100%;
      padding: 0.82rem 1rem 0.82rem 2.4rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid #2a1550;
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      color: #e2d9f3;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .input-group input:focus {
      background: rgba(147,51,234,0.07);
      border-color: rgba(147,51,234,0.6);
      box-shadow: 0 0 0 3px rgba(147,51,234,0.15);
    }

    .input-wrapper:focus-within i {
      color: #c084fc;
    }

    .input-group input::placeholder {
      color: #3d2868;
    }

    .btn-entrar {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, #5b21b6 0%, #7c3aed 50%, #9333ea 100%);
      color: #fff;
      border: none;
      border-top: 1px solid rgba(192,132,252,0.25);
      border-radius: 12px;
      font-size: 0.92rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
      box-shadow:
        0 4px 24px rgba(107,33,168,0.5),
        inset 0 1px 0 rgba(255,255,255,0.12);
      letter-spacing: 0.01em;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }

    .btn-entrar:hover:not(:disabled) {
      transform: translateY(-2px);
      filter: brightness(1.1);
      box-shadow:
        0 8px 32px rgba(107,33,168,0.65),
        inset 0 1px 0 rgba(255,255,255,0.15);
    }

    .btn-entrar:active:not(:disabled) {
      transform: translateY(1px);
      filter: brightness(0.94);
    }

    .btn-entrar:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-msg {
      margin-top: 1rem;
      padding: 0.65rem 0.9rem;
      background: rgba(220,38,38,0.12);
      border: 1px solid rgba(220,38,38,0.3);
      border-radius: 10px;
      font-size: 0.82rem;
      color: #fca5a5;
      display: none;
      align-items: center;
      gap: 0.45rem;
    }

    .error-msg.show { display: flex; }

    .login-footer {
      padding: 1rem 2rem;
      border-top: 1px solid #2a1550;
      text-align: center;
      font-size: 0.73rem;
      color: #3d2868;
    }
  </style>
</head>
<body>

<div class="ocean">
  <div class="bubbles" id="bubbles"></div>
</div>

<div class="page">
  <div class="login-card">

    <div class="login-header">
      <div class="icon-wrap">
        <img src="frontend/assets/images/boss-final.gif" alt="Boss">
      </div>
      <div class="pixel-title">SUPER COMPOSE BROS</div>
      <div class="subtitle">Digite seu username para entrar</div>
    </div>

    <div class="login-body">
      <div class="input-group">
        <label for="username-input">Username</label>
        <div class="input-wrapper">
          <input
            type="text"
            id="username-input"
            placeholder="ex: carlinhos"
            maxlength="30"
            autocomplete="off"
            autofocus
          />
          <i class="fa-solid fa-user"></i>
        </div>
      </div>

      <button class="btn-entrar" id="btn-entrar">
        <i class="fa-solid fa-right-to-bracket"></i>
        Entrar
      </button>

      <div class="error-msg" id="error-msg">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="error-text">Ocorreu um erro. Tente novamente.</span>
      </div>
    </div>

    <div class="login-footer">
      Carlinhos precisa de sua ajuda! Salve-o!
    </div>

  </div>
</div>

<script>
  // Bolhas de fundo
  (function spawnBubbles() {
    const container = document.getElementById('bubbles');
    for (let i = 0; i < 28; i++) {
      const b = document.createElement('div');
      b.className = 'bubble';
      const size  = 4 + Math.random() * 18;
      const left  = Math.random() * 100;
      const delay = Math.random() * 18;
      const dur   = 12 + Math.random() * 22;
      const drift = (Math.random() - 0.5) * 80;
      const swell = 0.8 + Math.random() * 0.5;
      b.style.cssText = `
        width:${size}px;height:${size}px;
        left:${left}%;
        --drift:${drift}px;--swell:${swell};
        animation-duration:${dur}s;
        animation-delay:-${delay}s;
      `;
      container.appendChild(b);
    }
  })();

  const input   = document.getElementById('username-input');
  const btn     = document.getElementById('btn-entrar');
  const errorEl = document.getElementById('error-msg');
  const errorTx = document.getElementById('error-text');

  function showError(msg) {
    errorTx.textContent = msg;
    errorEl.classList.add('show');
  }

  function hideError() {
    errorEl.classList.remove('show');
  }

  async function entrar() {
    const username = input.value.trim();

    if (!username) {
      showError('Informe um username para continuar.');
      input.focus();
      return;
    }

    hideError();
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Entrando...';

    try {
      const res = await fetch('http://localhost:3000/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username }),
      });

      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.error || 'Erro ao conectar com o servidor.');
      }

      const user = await res.json();

      // Salva o usuário na sessionStorage e redireciona para o mapa
      sessionStorage.setItem('scb_user', JSON.stringify(user));
      window.location.href = 'mapa.html';

    } catch (err) {
      showError(err.message || 'Não foi possível conectar ao servidor.');
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Entrar';
    }
  }

  btn.addEventListener('click', entrar);

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') entrar();
    if (errorEl.classList.contains('show')) hideError();
  });
</script>

</body>
</html>
