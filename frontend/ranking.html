<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/gif" href="assets/images/boss-final.gif">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Compose Bros · Ranking</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .ranking-card {
      position: relative;
      width: 100%;
      max-width: 540px;
      background: rgba(10, 6, 18, 0.82);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-radius: 20px;
      border: 1px solid #2a1550;
      box-shadow:
        0 32px 80px rgba(0,0,0,0.75),
        0 8px 24px rgba(107,33,168,0.2),
        inset 0 1px 0 rgba(147,51,234,0.12);
      animation: cardIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      overflow: hidden;
    }

    .ranking-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg,
        transparent,
        rgba(147,51,234,0.6) 50%,
        transparent
      );
      pointer-events: none;
    }

    /* ── HEADER ── */
    .ranking-header {
      padding: 1.5rem 1.75rem;
      border-bottom: 1px solid #2a1550;
      background: linear-gradient(180deg, rgba(45,16,96,0.5) 0%, transparent 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .ranking-header-left {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }

    .ranking-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(107,33,168,0.2);
      border: 1px solid rgba(147,51,234,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: #c084fc;
      box-shadow: 0 0 18px rgba(147,51,234,0.3), inset 0 1px 0 rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    .ranking-header-titles .pixel-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      color: #c084fc;
      letter-spacing: 0.07em;
      line-height: 1.8;
      text-shadow: 0 0 20px rgba(192,132,252,0.5);
    }

    .ranking-header-titles .subtitle {
      font-size: 0.76rem;
      color: #5c4d7a;
      margin-top: 0.2rem;
    }

    .btn-refresh {
      background: rgba(147,51,234,0.1);
      border: 1px solid #2a1550;
      border-radius: 10px;
      color: #5c4d7a;
      font-size: 0.8rem;
      padding: 0.45rem 0.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }

    .btn-refresh:hover {
      background: rgba(147,51,234,0.2);
      border-color: rgba(147,51,234,0.4);
      color: #c084fc;
    }

    .btn-refresh i.spinning { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── LISTA ── */
    .ranking-body {
      padding: 1.1rem 1.1rem 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      max-height: 480px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(147,51,234,0.2) transparent;
    }

    .ranking-body::-webkit-scrollbar { width: 4px; }
    .ranking-body::-webkit-scrollbar-track { background: transparent; }
    .ranking-body::-webkit-scrollbar-thumb { background: rgba(147,51,234,0.25); border-radius: 99px; }

    .rank-row {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid #1e1030;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      animation: fadeInUp 0.35s ease both;
    }

    .rank-row:hover {
      background: rgba(147,51,234,0.08);
      border-color: rgba(147,51,234,0.25);
      transform: translateX(3px);
    }

    /* Top 3 */
    .rank-row.pos-1 { background: rgba(217,119,6,0.08); border-color: rgba(217,119,6,0.25); }
    .rank-row.pos-2 { background: rgba(100,116,139,0.07); border-color: rgba(100,116,139,0.2); }
    .rank-row.pos-3 { background: rgba(146,64,14,0.08); border-color: rgba(146,64,14,0.25); }

    .rank-pos {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.58rem;
      width: 28px;
      text-align: center;
      flex-shrink: 0;
      color: #3d2868;
    }

    .rank-row.pos-1 .rank-pos { color: #fbbf24; text-shadow: 0 0 10px rgba(251,191,36,0.5); }
    .rank-row.pos-2 .rank-pos { color: #64748b; }
    .rank-row.pos-3 .rank-pos { color: #cd7c3a; }

    .rank-medal {
      font-size: 1.05rem;
      width: 22px;
      text-align: center;
      flex-shrink: 0;
    }

    .rank-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(107,33,168,0.2);
      border: 1px solid rgba(147,51,234,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 800;
      color: #c084fc;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: -0.02em;
    }

    .rank-info {
      flex: 1;
      min-width: 0;
    }

    .rank-name {
      font-size: 0.88rem;
      font-weight: 700;
      color: #e2d9f3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rank-score-bar-wrap {
      margin-top: 5px;
      height: 3px;
      background: rgba(255,255,255,0.05);
      border-radius: 99px;
      overflow: hidden;
    }

    .rank-score-bar {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #6b21a8, #9333ea);
      box-shadow: 0 0 6px rgba(147,51,234,0.5);
      transition: width 1s cubic-bezier(0.4,0,0.2,1);
    }

    .rank-row.pos-1 .rank-score-bar { background: linear-gradient(90deg, #d97706, #fbbf24); box-shadow: 0 0 6px rgba(251,191,36,0.4); }
    .rank-row.pos-2 .rank-score-bar { background: linear-gradient(90deg, #475569, #94a3b8); box-shadow: none; }
    .rank-row.pos-3 .rank-score-bar { background: linear-gradient(90deg, #92400e, #cd7c3a); box-shadow: 0 0 6px rgba(205,124,58,0.3); }

    .rank-score {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      color: #5c4d7a;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .rank-row.pos-1 .rank-score { color: #fbbf24; }
    .rank-row.pos-2 .rank-score { color: #64748b; }
    .rank-row.pos-3 .rank-score { color: #cd7c3a; }

    /* Estado vazio */
    .ranking-empty {
      text-align: center;
      padding: 2.5rem 1rem;
      color: #3d2868;
      font-size: 0.85rem;
      display: none;
      flex-direction: column;
      gap: 0.5rem;
      align-items: center;
    }

    .ranking-empty i { font-size: 2rem; opacity: 0.5; }

    /* Estado de loading */
    .ranking-loading {
      text-align: center;
      padding: 2.5rem 1rem;
      color: #5c4d7a;
      font-size: 0.82rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
    }

    .ranking-loading i { font-size: 1.4rem; color: #7c3aed; opacity: 0.7; animation: spin 1s linear infinite; }

    /* ── FOOTER ── */
    .ranking-footer {
      padding: 0.9rem 1.75rem;
      border-top: 1px solid #1e1030;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .player-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.76rem;
      color: #5c4d7a;
    }

    .player-badge span {
      color: #c084fc;
      font-weight: 700;
    }

    .total-badge {
      font-size: 0.7rem;
      color: #3d2868;
    }
  </style>
</head>
<body>

<div class="ocean">
  <div class="bubbles" id="bubbles"></div>
</div>

<div class="page">
  <div class="ranking-card">

    <div class="ranking-header">
      <div class="ranking-header-left">
        <div class="ranking-icon">
          <i class="fa-solid fa-trophy"></i>
        </div>
        <div class="ranking-header-titles">
          <div class="pixel-title">RANKING</div>
          <div class="subtitle">Todos os jogadores</div>
        </div>
      </div>
      <button class="btn-refresh" id="btn-refresh">
        <i class="fa-solid fa-rotate-right" id="refresh-icon"></i>
        Atualizar
      </button>
    </div>

    <div class="ranking-body" id="ranking-body">
      <div class="ranking-loading" id="loading-state">
        <i class="fa-solid fa-spinner"></i>
        Carregando ranking...
      </div>
      <div class="ranking-empty" id="empty-state">
        <i class="fa-solid fa-ghost"></i>
        Nenhum jogador ainda.
      </div>
    </div>

    <div class="ranking-footer">
      <div class="player-badge" id="player-badge" style="display:none">
        <i class="fa-solid fa-circle-user"></i>
        Logado como <span id="player-name">—</span>
      </div>
      <div class="total-badge" id="total-badge"></div>
    </div>

  </div>
</div>

<script>
  // Bolhas
  (function () {
    const c = document.getElementById('bubbles');
    for (let i = 0; i < 28; i++) {
      const b = document.createElement('div');
      b.className = 'bubble';
      const size = 4 + Math.random() * 18;
      b.style.cssText = `
        width:${size}px;height:${size}px;
        left:${Math.random() * 100}%;
        --drift:${(Math.random() - 0.5) * 80}px;
        --swell:${0.8 + Math.random() * 0.5};
        animation-duration:${12 + Math.random() * 22}s;
        animation-delay:-${Math.random() * 18}s;
      `;
      c.appendChild(b);
    }
  })();

  // Usuário logado
  const user = JSON.parse(sessionStorage.getItem('scb_user') || 'null');
  if (user) {
    document.getElementById('player-badge').style.display = 'flex';
    document.getElementById('player-name').textContent = user.username;
  }

  const body        = document.getElementById('ranking-body');
  const loadingEl   = document.getElementById('loading-state');
  const emptyEl     = document.getElementById('empty-state');
  const totalBadge  = document.getElementById('total-badge');
  const refreshBtn  = document.getElementById('btn-refresh');
  const refreshIcon = document.getElementById('refresh-icon');

  async function carregarRanking() {
    refreshIcon.classList.add('spinning');
    refreshBtn.disabled = true;

    // Remove linhas anteriores (mantém loading e empty)
    body.querySelectorAll('.rank-row').forEach(el => el.remove());
    loadingEl.style.display = 'flex';
    emptyEl.style.display   = 'none';
    totalBadge.textContent  = '';

    try {
      const res  = await fetch('http://localhost:3000/api/ranking');
      const data = await res.json();

      loadingEl.style.display = 'none';

      if (!data.length) {
        emptyEl.style.display = 'flex';
        return;
      }

      const maxScore = data[0].score || 1;

      const medals = ['🥇', '🥈', '🥉'];

      data.forEach((player, i) => {
        const pos      = i + 1;
        const posClass = pos <= 3 ? `pos-${pos}` : '';
        const medal    = medals[i] ?? '';
        const initials = player.username.slice(0, 2);
        const barWidth = maxScore > 0 ? Math.max(4, Math.round((player.score / maxScore) * 100)) : 4;
        const isMe     = user && user.username === player.username;

        const row = document.createElement('div');
        row.className = `rank-row ${posClass}`;
        row.style.animationDelay = `${i * 0.05}s`;

        row.innerHTML = `
          <div class="rank-pos">${pos}</div>
          <div class="rank-medal">${medal}</div>
          <div class="rank-avatar">${initials}</div>
          <div class="rank-info">
            <div class="rank-name">${player.username}${isMe ? ' <span style="font-size:0.65rem;color:#22d3ee;opacity:0.8">(você)</span>' : ''}</div>
            <div class="rank-score-bar-wrap">
              <div class="rank-score-bar" style="width:0%" data-width="${barWidth}%"></div>
            </div>
          </div>
          <div class="rank-score">${player.score} pts</div>
        `;

        body.appendChild(row);
      });

      // Anima as barras depois de montar o DOM
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          body.querySelectorAll('.rank-score-bar').forEach(bar => {
            bar.style.width = bar.dataset.width;
          });
        });
      });

      totalBadge.textContent = `${data.length} jogador${data.length !== 1 ? 'es' : ''}`;

    } catch (err) {
      loadingEl.style.display = 'none';
      emptyEl.style.display   = 'flex';
      emptyEl.querySelector('i').className = 'fa-solid fa-triangle-exclamation';
      emptyEl.querySelector('span') && null;
      emptyEl.innerHTML = `
        <i class="fa-solid fa-triangle-exclamation"></i>
        Não foi possível carregar o ranking.
      `;
    } finally {
      refreshIcon.classList.remove('spinning');
      refreshBtn.disabled = false;
    }
  }

  refreshBtn.addEventListener('click', carregarRanking);

  carregarRanking();
</script>

</body>
</html>
